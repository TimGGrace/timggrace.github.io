<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.8.0/p5.js"></script> <!-- P5 Canvas JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.8.0/addons/p5.sound.min.js"></script> <!-- P5 Sounds -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script> <!-- Chart JS -->
    <title>TGGrace</title>
</head>
<body style="background-color:rgb(200,180,200); padding:0;">
    <div style="display:flex; margin-top:10pt; flex-grow:1;">
        <div id="piSimWindow"></div>
        <div style="display:flex;flex-direction:column; flex:1; justify-content: start;">
            <div style="display:flex; height:30px; margin-left:5pt;">
                <div class="slash" style="height:30px"></div>
                <div class="slash" style="height:30px"></div>
                <div class="slashtitle" style="height:26px; font-size:22px;">Approximating Pi</div>
            </div>
            <div style="display:flex; flex-direction: row; justify-content: space-between; min-width: fit-content;">
                <div id="displayInCount"></div>
                <div id="displayTotalCount"></div>
                <div></div>
            </div>
            <div id="displayProp"></div>
            <div id="displayPi"></div>
            <div style="display:flex;"><button id="piPlayPause"></button>
            <button id="piReset"></button></div>
            <canvas id="errorOutput" style="height:450px; min-width:200px; max-width: 100%;"></canvas>
        </div>
    </div>
    <script src="../scripts/piScript.js"></script>
</body>
